    技能:
      - name: 电力电子与无线能量传输系统设计
        level:
        keywords: "具备电力电子系统、无线电能传输（WPT）系统及双向能量流无线电机系统的建模、分析与控制设计经验，熟悉系统级设计、参数优化及实验验证流程。"

      - name: 复杂动力学系统建模与分析
        level:
        keywords: "具备复杂动力学系统建模经验，研究对象涵盖电力电子系统、无线电能传输系统、电机驱动系统及多物理场耦合系统，能够开展系统建模、稳定性分析与控制器设计。"

      - name: 先进控制理论与控制器设计
        level:
        keywords: "熟悉滑模控制、自适应控制、扰动观测器（ESO）等先进控制方法，具备非线性系统控制器设计、信号处理及实时控制实现经验。嵌入式控制系统开发"

      - name: 嵌入式控制系统开发
        level:
        keywords: "具备从控制算法开发到嵌入式平台部署的完整研发经验，熟练使用 MATLAB/Simulink、Python 及 C 语言开展建模仿真、自动代码生成、实时控制系统开发与 MCU 平台实现。"

      - name: 智能控制与机器学习
        level:
        keywords: "了解机器学习与神经网络相关算法，具备神经网络辅助控制及智能控制策略开发经验，能够将数据驱动方法与传统控制理论相结合应用于复杂控制系统。"