    Research and Engineering Experience:
      - company: Wireless-Powered Full-Azimuth Podded Thruster
        position: New Propulsion System for Unmanned Vessels
        location: Guangzhou, China
        highlights:
          - Developed a wireless-powered propulsion prototype for unmanned vessels, targeting sealing reliability and reduced maintenance compared with conventional podded propulsion solutions.
          - Modeled and designed wireless power transfer system parameters.
          - Developed control and integration for a high-frequency wireless power converter.
          - Implemented motor drive control, including field-oriented control and real-time control.
          - Contributed sealed mechanical structure design, 3D modeling, prototype integration, debugging, and validation.
          - Built a system including a 1200 W / 100 V GaN motor driver, a 5 kW integrated WPT inverter, 5-10 cm transfer distance, and 92% peak efficiency.

      - company: Active-Rectifier Wireless Motor System
        position: Research Highlight
        highlights:
          - Developed system-level analysis and dual-side phase shift control for active-rectifier wireless motor systems.
          - "Related selected paper: An Active-Rectifier Wireless Motor System with Dual-Side Phase Shift Control."

      - company: Fixed-Time Voltage Regulation for Wireless Power Transfer
        position: Research Highlight
        highlights:
          - Combined neural-network-assisted control with adaptive practical fixed-time voltage regulation for wireless power transfer systems.
          - "Related selected paper: ELM-Based Adaptive Practical Fixed-Time Voltage Regulation for Wireless Power Transfer System."

      - company: Electronic Throttle Control
        position: Research Highlight
        highlights:
          - Developed adaptive finite-time and fixed-time sliding mode control algorithms for electronic throttle control systems.
          - Addressed nonlinear dynamics, robustness, convergence speed, and learning-assisted compensation.

    Skills:
      - label: Power Electronics System Design
        details: Power electronics modeling, wireless power transfer, wireless motor systems, bidirectional energy conversion
      - label: Complex Dynamics Modeling
        details: System modeling, nonlinear dynamics, dynamic wireless power transfer
      - label: Sliding Mode Control Theory
        details: Adaptive control, barrier-function control, finite-time control, fixed-time control
      - label: Embedded Systems Programming
        details: Matlab, Python, C, Windows development, embedded systems
      - label: Neural Network Methods
